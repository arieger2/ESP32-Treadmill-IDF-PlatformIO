; PlatformIO Project Configuration File - ESP-IDF v5.5.x with Arduino as Component
[env:esp32-s3-16mb]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf, arduino

; Flash Configuration
board_upload.flash_size = 16MB
board_build.partitions = partitions/custom_16MB_littlefs.csv
board_build.filesystem = littlefs
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

; PSRAM Support
build_unflags = 
    -fno-exceptions

build_flags = 
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_NIMBLE_CPP_LOG_LEVEL=0
    -fexceptions
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1

; Embed required certificate files for ESP Insights and Rainmaker (even if disabled)
board_build.embed_txtfiles = 
    managed_components/espressif__esp_insights/server_certs/https_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_mqtt_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_claim_service_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_ota_server.crt

; Upload & Monitor
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; PlatformIO Libraries (via Arduino Component)
lib_deps = 
    bblanchon/ArduinoJson@^7.4.2
    rlogiacco/CircularBuffer@^1.4.0
    paulstoffregen/Time@^1.6.1
    esp32async/AsyncTCP@^3.4.9
    esp32async/ESPAsyncWebServer@^3.9.3
    h2zero/NimBLE-Arduino@^2.3.7
    ayushsharma82/ElegantOTA@^3.1.7

; Build Scripts
extra_scripts = pre:pre_build.py
